<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buykori Admin — Redirecting...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@700;800&display=swap');
    :root { --bg:#060b18; --blue:#3b82f6; --violet:#8b5cf6; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:#e2eaf8;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(59,130,246,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(139,92,246,0.1) 0%, transparent 50%);
    }
    .wrap { text-align:center; max-width:420px; padding:32px 24px; }
    .logo {
      width:64px; height:64px; border-radius:18px;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      display:inline-flex; align-items:center; justify-content:center;
      font-family:'Outfit',sans-serif; font-size:28px; font-weight:900; color:#fff;
      box-shadow:0 0 0 1px rgba(139,92,246,.4), 0 16px 48px rgba(59,130,246,.35);
      margin-bottom:24px;
    }
    h1 { font-family:'Outfit',sans-serif; font-size:22px; font-weight:800; color:#fff; margin-bottom:8px; letter-spacing:-.4px; }
    p { font-size:14px; color:#7c8fb5; margin-bottom:28px; line-height:1.6; }
    .spinner {
      width:40px; height:40px; border:3px solid rgba(99,102,241,.2);
      border-top-color:#6366f1; border-radius:50%;
      animation:spin .7s linear infinite; margin:0 auto 20px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 24px; border-radius:10px;
      background:linear-gradient(135deg,#3b82f6,#6366f1);
      color:#fff; font-weight:700; font-size:14px; text-decoration:none;
      box-shadow:0 4px 18px rgba(59,130,246,.35); transition:all .2s;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(59,130,246,.45); }
    .note { margin-top:16px; font-size:12px; color:#475569; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">B</div>
    <h1>Buykori AdSync Admin</h1>
    <p>Redirecting you to the main admin dashboard…<br>Sign in with your admin credentials.</p>
    <div class="spinner"></div>
    <a href="https://api.buykori.app/api/v1/admin" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Open Admin Panel
    </a>
    <p class="note">admin.buykori.app → api.buykori.app/api/v1/admin</p>
  </div>
  <script>
    // Auto-redirect after 1.5s
    setTimeout(() => { window.location.href = "https://api.buykori.app/api/v1/admin"; }, 1500);
  </script>
</body>
</html>
